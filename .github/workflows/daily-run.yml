name: SLAM论文每日推送Agent

on:
  # 定时执行：UTC 23:00 = 北京时间次日 07:00
  schedule:
    - cron: "0 23 * * *"
    - cron: "0 13 * * *"  # 北京时间晚9点
  # 支持手动触发测试
  workflow_dispatch:
# 显式授予仓库内容写入权限
permissions:
  contents: write
  
jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行论文Agent
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_SMTP_PASSWORD: ${{ secrets.EMAIL_SMTP_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python paper_agent.py

      - name: 更新已推送记录
        run: |
          git config --global user.name "choptickss"
          git config --global user.email "2389817852@qq.com"
          git add pushed_papers.json
          git commit -m "更新已推送论文记录" || echo "无新记录无需提交"
          git push
